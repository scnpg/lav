# Supabase CLI project config for Lav.
# Generated for a recent Supabase CLI (2024/2025-era). If `supabase start`
# complains about an unrecognized key, your CLI version uses a slightly
# different config.toml shape - delete the offending key/section, it will
# fall back to the CLI's default for that setting.

project_id = "lav"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
# Spec asks for a supabase/seed/ directory (rather than the CLI default of
# a single supabase/seed.sql) - point the seeder at it explicitly.
sql_paths = ["./seed/seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["exp://localhost:8081", "exp://127.0.0.1:8081"]
jwt_expiry = 3600
enable_signup = true
enable_confirmations = false

[auth.email]
enable_signup = true
enable_confirmations = false

[functions.moderate-photo]
# Caller must be a signed-in user (the mobile app's anon-key + user JWT) -
# the function itself elevates to the service role internally for the parts
# that need to bypass RLS (downloading from quarantine, writing moderation
# results). See supabase/functions/moderate-photo/index.ts.
verify_jwt = true
